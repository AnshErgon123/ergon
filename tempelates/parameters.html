<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parameters - {{ category }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
    .table-wrapper { max-height: 75vh; overflow-y: auto; }
    table tbody tr:nth-child(even) { background-color: #f8f9fa; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">Parameters for Node {{ node_id }} — {{ category }}</h2>
    <div class="table-wrapper">
      <table class="table table-bordered table-striped">
        <thead class="table-primary">
          <tr>
            <th>Name</th>
            <th>Device Value</th>
            <th>Project Value</th>
            <th>Min Value</th>
            <th>Max Value</th>
          </tr>
        </thead>
        <tbody>
          {% for p in params %}
          <tr title="{{ p.help_text }}">
            <td>{{ p.name }}</td>
            <td>{{ p.device_value }}</td>
            <td>{{ p.project_value }}</td>
            <td>{{ p.min_value }}</td>
            <td>{{ p.max_value }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <a href="/" class="btn btn-secondary mt-3">← Back to Live Monitor</a>
  </div>
</body>
</html>
