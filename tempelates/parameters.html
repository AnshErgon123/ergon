<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parameter Configuration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 2rem; }
    .table-wrapper { max-width: 800px; margin: auto; }
  </style>
</head>
<body>
  <div class="table-wrapper">
    <h1 class="mb-4">CAN Parameter Schema</h1>
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          {% for col in columns %}
            <th>{{ col.replace('_',' ')|title }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for entry in schema %}
          <tr>
            {% for col in columns %}
              <td>{{ entry[col] }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="text-center mt-3">
      <a href="/" class="btn btn-secondary">Back to Live Monitor</a>
    </div>
  </div>
  <footer class="text-center mt-4">
    <small>Auto-generated from <code>schema.json</code></small>
  </footer>
</body>
</html>
