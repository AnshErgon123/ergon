<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAN Bus Live Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    body { padding-top: 70px; }
    .status-dot { /* … */ }
    /* your existing styles… */
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="{{ url_for('static', filename='logo.png') }}" width="30" height="30">
        <span class="ms-2">CAN Monitor</span>
      </a>
      <div class="d-flex">
        <div id="status-indicator" class="status-dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <!-- search + download -->
    <div class="row mb-3">
      <div class="col-md-6">
        <input id="searchInput" class="form-control" placeholder="Filter by CAN ID or Data…">
      </div>
      <div class="col-md-6 text-end">
        <a href="/logs/download" class="btn btn-sm btn-outline-secondary">Download Logs</a>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="table table-striped table-bordered">
        <thead class="table-primary">
          <tr><th>CAN ID</th><th>Data</th><th>Timestamp</th></tr>
        </thead>
        <tbody id="log"></tbody>
      </table>
    </div>
    <div class="text-end">
      <a href="/parameters" class="btn btn-link">Configure Parameters</a>
    </div>
  </main>

  <footer>…</footer>

  <script>
    const socket = io();
    let allMsgs = [], heartbeatTimer;
    const log = document.getElementById("log");
    const searchInput = document.getElementById("searchInput");
    const dot = document.getElementById("status-indicator");
    const text = document.getElementById("status-text");

    socket.on("can_message", data => {
      allMsgs.unshift(data);
      if(allMsgs.length>100) allMsgs.pop();
      renderTable();
    });

    socket.on("heartbeat", payload => {
      const online = payload.status==="online";
      dot.classList.toggle("online", online);
      text.textContent = online?"Connected":"Disconnected";
      clearTimeout(heartbeatTimer);
      if(online) heartbeatTimer = setTimeout(()=>dot.classList.remove("online"),5000);
    });

    searchInput.addEventListener("input", renderTable);

    function renderTable(){
      const f = searchInput.value.toLowerCase();
      log.innerHTML = "";
      allMsgs
        .filter(m => m.id.toLowerCase().includes(f) || m.data.toLowerCase().includes(f))
        .forEach(m => {
          const row = document.createElement("tr");
          row.innerHTML = `<td>${m.id}</td><td>${m.data}</td><td>${m.timestamp}</td>`;
          log.appendChild(row);
        });
    }
  </script>
</body>
</html>
